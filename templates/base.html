{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PharmaPlus{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Global Styles (Important animations/gradients only) -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block extra_css %}{% endblock %}
</head>
<body style="font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; display: flex; flex-direction: column; min-height: 100vh; margin: 0;">

    <!-- Navbar Section -->
    <nav class="navbar navbar-expand-lg sticky-top" style="background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(226, 232, 240, 0.6); box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); padding: 1rem 5%;">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="{% url 'index' %}" style="color: #10b981; font-size: 1.75rem; letter-spacing: -0.5px;">PharmaPlus</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-3">
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom fw-semibold" style="color: #475569;" href="{% url 'index' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom fw-semibold" style="color: #475569;" href="#">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom fw-semibold" style="color: #475569;" href="{% url 'about' %}">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom fw-semibold" style="color: #475569;" href="#">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Section -->
    <main class="flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer Section -->
    <footer class="mt-auto text-white text-center py-5" style="background-color: #0f172a;">
        <div class="container">
            <p class="mb-0" style="opacity: 0.9;">&copy; 2026 PharmaPlus. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
