{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PharmaPlus{% endblock %}</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Global Styles -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- CSS Blocks for individual pages -->
    {% block extra_css %}
    {% endblock %}
</head>
<body>

    <!-- Header Section -->
    <header>
        <nav>
            <a href="/" class="brand">PharmaPlus</a>
            <div class="nav-links">
                <a href="{% url 'index' %}">Home</a>
                <a href="#">Products</a>
                <a href="{% url 'about' %}">About Us</a>
                <a href="#">Contact</a>
            </div>
        </nav>
    </header>

    <!-- Main Content Section -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2026 PharmaPlus. All rights reserved.</p>
    </footer>

    <!-- JavaScript Blocks for individual pages -->
    {% block extra_js %}
    {% endblock %}
</body>
</html>
