{% extends 'frontend/base.html' %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="glass-form-card">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-plus display-4 text-success"></i>
                    <h3 class="fw-bold mt-3">Create an Account</h3>
                    <p class="text-secondary">Join PharmaPlus to manage your health easily</p>
                </div>

                <form>
                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label class="form-label text-dark fw-medium">First Name</label>
                            <input type="text" class="glass-input" placeholder="First Name" required>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label text-dark fw-medium">Last Name</label>
                            <input type="text" class="glass-input" placeholder="Last Name" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-dark fw-medium">Email address</label>
                        <input type="email" class="glass-input" placeholder="you@example.com" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-dark fw-medium">Password</label>
                        <input type="password" class="glass-input" placeholder="Create a strong password" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-dark fw-medium">Confirm Password</label>
                        <input type="password" class="glass-input" placeholder="Repeat your password" required>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="terms" required>
                        <label class="form-check-label text-secondary small" for="terms">I agree to the <a href="#" class="text-primary text-decoration-none">Terms of Service</a> and <a href="#" class="text-primary text-decoration-none">Privacy Policy</a>.</label>
                    </div>

                    <div class="d-grid w-100">
                        <button type="submit" class="btn btn-glass-primary btn-lg bg-success border-success">Create Account</button>
                    </div>
                </form>

                <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-25">
                    <p class="text-secondary mb-0">Already have an account? <a href="/login/" class="text-primary fw-medium text-decoration-none">Log in</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
