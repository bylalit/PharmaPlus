{% extends 'frontend/base.html' %}

{% block title %}Log In{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="glass-form-card">
                <div class="text-center mb-4">
                    <i class="bi bi-capsule-pill display-4 text-primary"></i>
                    <h3 class="fw-bold mt-3">Welcome Back</h3>
                    <p class="text-secondary">Log in to manage your medical orders</p>
                </div>

                <form>
                    <div class="mb-3">
                        <label class="form-label text-dark fw-medium">Email address</label>
                        <input type="email" class="glass-input" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="mb-3">
                        <div class="d-flex justify-content-between">
                            <label class="form-label text-dark fw-medium">Password</label>
                            <a href="#" class="text-primary text-decoration-none small">Forgot password?</a>
                        </div>
                        <input type="password" class="glass-input" placeholder="Enter your password" required>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label text-secondary small" for="rememberMe">Remember me</label>
                    </div>

                    <div class="d-grid w-100">
                        <button type="submit" class="btn btn-glass-primary btn-lg">Log In</button>
                    </div>
                </form>

                <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-25">
                    <p class="text-secondary mb-0">Don't have an account? <a href="/signup/" class="text-primary fw-medium text-decoration-none">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
