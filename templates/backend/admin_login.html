<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | PharmaPlus</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Medical themed gradient with soft overlay */
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.8), rgba(16, 185, 129, 0.9)), url('https://images.unsplash.com/photo-1550831107-1553da8c8464?q=80&w=2600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(to right, #0ea5e9, #10b981);
        }

        .btn-modern-primary {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            border: none;
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.3);
            transition: all 0.3s ease;
        }

        .btn-modern-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(14, 165, 233, 0.4);
            color: white;
        }

        .brand-icon {
            font-size: 3rem;
            background: linear-gradient(to right, #0ea5e9, #10b981);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <i class="bi bi-heart-pulse-fill brand-icon"></i>
        <h3 class="fw-bolder text-dark mb-1">PharmaPlus</h3>
        <p class="text-muted small mb-4">Secure Administration Portal</p>

        <form action="{% url 'dashboard_home' %}" method="POST" onsubmit="event.preventDefault(); window.location.href=this.action;">
            <div class="form-floating mb-3">
                <input type="email" class="form-control rounded-3 border-0 shadow-sm" id="emailInput" placeholder="name@example.com" value="admin@pharmaplus.com">
                <label for="emailInput" class="text-muted fw-bold">Email Address</label>
            </div>
            
            <div class="form-floating mb-3">
                <input type="password" class="form-control rounded-3 border-0 shadow-sm" id="passInput" placeholder="Password" value="dummy_password">
                <label for="passInput" class="text-muted fw-bold">Password</label>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 px-1">
                <div class="form-check text-start">
                    <input class="form-check-input" type="checkbox" value="" id="rememberCheck" checked>
                    <label class="form-check-label small text-muted fw-bold" for="rememberCheck">
                        Remember me
                    </label>
                </div>
                <a href="#" class="text-decoration-none small text-primary fw-bold">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-modern-primary w-100 py-3 rounded-pill fw-bold fs-6">
                Authenticate Securely
            </button>
            <p class="mt-4 mb-0 text-muted small"><i class="bi bi-shield-lock-fill text-success border-success me-1"></i> 256-bit AES Encrypted Connection</p>
        </form>
    </div>

</body>
</html>
