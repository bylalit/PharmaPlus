{% extends 'backend/base.html' %}

{% block title %}Edit Product | PharmaPlus Dashboard{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'dashboard_home' %}" class="text-decoration-none">Dashboard</a></li>
        <li class="breadcrumb-item"><a href="{% url 'dashboard_products' %}" class="text-decoration-none">Products</a></li>
        <li class="breadcrumb-item active" aria-current="page">Edit #{{ id }}</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="glass-card">
            <div class="p-4 border-bottom border-secondary-subtle bg-light bg-opacity-50 d-flex justify-content-between align-items-center">
                <h4 class="fw-bold mb-0">Edit Product #{{ id }}</h4>
                <button class="btn btn-outline-danger btn-sm rounded-pill px-3"><i class="bi bi-trash"></i> Delete</button>
            </div>
            
            <form action="{% url 'dashboard_products' %}" method="POST" class="p-4" onsubmit="event.preventDefault(); window.location.href=this.action;">
                <div class="row g-4 mb-4">
                    <div class="col-md-8">
                        <label class="form-label fw-bold">Product Name</label>
                        <input type="text" class="form-control" value="Sample Product Name">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Category</label>
                        <select class="form-select">
                            <option>Prescription Medicines</option>
                            <option selected>Vitamins & Supplements</option>
                            <option>Personal Care</option>
                        </select>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Price ($)</label>
                        <input type="number" step="0.01" class="form-control" value="24.99">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Current Stock</label>
                        <input type="number" class="form-control" value="150">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Product Description</label>
                    <textarea class="form-control" rows="4">This is a fully editable dummy description for product #{{ id }}.</textarea>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-5 border-top border-light pt-4">
                    <a href="{% url 'dashboard_products' %}" class="btn btn-light px-4">Cancel</a>
                    <button type="submit" class="btn btn-primary px-4 shadow-sm"><i class="bi bi-check2 me-2"></i> Update Product</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
