{% extends 'backend/base.html' %}

{% block title %}System Settings | PharmaPlus Dashboard{% endblock %}

{% block content %}
<div class="row justify-content-center pt-3">
    <div class="col-lg-8">
        <div class="dashboard-card border-0 mb-5">
            <div class="p-4 px-5 border-bottom border-light bg-light bg-opacity-50">
                <h4 class="fw-bolder mb-0 text-dark">System Configuration</h4>
                <p class="text-muted small mb-0 mt-1">Manage core platform settings, taxes, and contact configuration.</p>
            </div>
            
            <form action="#" method="POST" class="p-5" onsubmit="event.preventDefault();">
                <div class="form-floating text-muted shadow-sm rounded-3 mb-4">
                    <input type="text" class="form-control border-0" id="siteName" value="PharmaPlus">
                    <label for="siteName" class="fw-bold">Global Site Name</label>
                </div>
                
                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <div class="form-floating text-muted shadow-sm rounded-3">
                            <input type="email" class="form-control border-0" id="contactEmail" value="support@pharmaplus.com">
                            <label for="contactEmail" class="fw-bold">Support Email</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating text-muted shadow-sm rounded-3">
                            <input type="text" class="form-control border-0" id="contactPhone" value="+1 (800) 123-4567">
                            <label for="contactPhone" class="fw-bold">Support Phone</label>
                        </div>
                    </div>
                </div>

                <hr class="my-5 border-light border-2">

                <h5 class="fw-bold mb-4">Taxes & Shipping</h5>
                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <div class="form-floating text-muted shadow-sm rounded-3">
                            <input type="number" step="0.1" class="form-control border-0" id="taxRate" value="8.5">
                            <label for="taxRate" class="fw-bold">Default Tax Rate (%)</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating text-muted shadow-sm rounded-3">
                            <input type="number" step="0.01" class="form-control border-0" id="shipCost" value="5.00">
                            <label for="shipCost" class="fw-bold">Flat Shipping Cost ($)</label>
                        </div>
                    </div>
                </div>
                
                <div class="d-flex justify-content-end pt-4 border-top border-light mt-5">
                    <button class="btn-modern btn-modern-primary rounded-pill px-5 shadow-lg"><i class="bi bi-save2 me-2"></i> Save Configuration</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
