{% extends 'backend/base.html' %}

{% block title %}Profile | PharmaPlus Dashboard{% endblock %}

{% block content %}
<div class="row pt-3">
    <div class="col-lg-4">
        <div class="dashboard-card border-0 mb-4 h-100 position-relative overflow-hidden text-center d-flex flex-column justify-content-center">
            <!-- Decorative gradient top -->
            <div class="position-absolute top-0 start-0 w-100" style="height: 120px; background: linear-gradient(135deg, var(--primary-color), var(--success-color)); z-index: 0;"></div>
            
            <div class="p-5 position-relative z-1 pt-5 mt-5">
                <img src="https://ui-avatars.com/api/?name=Admin+User&background=fff&color=0284c7&rounded=true" alt="Admin" class="rounded-circle shadow border border-4 border-white mb-3" style="width: 120px; height: 120px;">
                <h4 class="fw-bolder text-dark mb-1">Admin User</h4>
                <p class="text-primary fw-bold small text-uppercase tracking-widest mb-4">Super Administrator</p>
                <div class="d-flex justify-content-center gap-2">
                    <button class="btn btn-outline-primary rounded-pill shadow-sm px-4 btn-sm fw-bold"><i class="bi bi-camera me-1"></i> Avatar</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="col-lg-8">
        <div class="dashboard-card border-0">
            <div class="p-4 px-5 border-bottom border-light bg-light bg-opacity-50">
                <h4 class="fw-bolder mb-0 text-dark">Personal Information</h4>
                <p class="text-muted small mb-0 mt-1">Review and update your system login details.</p>
            </div>
            <form action="#" method="POST" class="p-5" onsubmit="event.preventDefault();">
                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <div class="form-floating text-muted shadow-sm rounded-3">
                            <input type="text" class="form-control border-0" id="adminName" value="Admin User">
                            <label for="adminName" class="fw-bold">Full Name</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating text-muted shadow-sm rounded-3">
                            <input type="email" class="form-control border-0" id="adminEmail" value="admin@pharmaplus.com">
                            <label for="adminEmail" class="fw-bold">Email Address</label>
                        </div>
                    </div>
                </div>

                <hr class="my-5 border-light border-2">

                <h5 class="fw-bold mb-4">Security</h5>
                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <div class="form-floating text-muted shadow-sm rounded-3">
                            <input type="password" class="form-control border-0" id="pass1" placeholder="New Password">
                            <label for="pass1" class="fw-bold">New Password</label>
                            <div class="form-text mt-2 small ms-2"><i class="bi bi-info-circle text-primary"></i> Leave blank to keep current password.</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating text-muted shadow-sm rounded-3">
                            <input type="password" class="form-control border-0" id="pass2" placeholder="Confirm Password">
                            <label for="pass2" class="fw-bold">Confirm New Password</label>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end pt-4 border-top border-light mt-5">
                    <button class="btn-modern btn-modern-primary rounded-pill px-5 shadow-lg"><i class="bi bi-shield-check me-2"></i> Update Security Profile</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
