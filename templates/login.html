{% extends 'base.html' %}

{% block title %}Login | PharmaPlus{% endblock %}

{% block content %}
<div class="container py-5 d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    
    <!-- Abstract blurred background elements for auth page -->
    <div class="position-absolute rounded-circle" style="width: 400px; height: 400px; background: rgba(16, 185, 129, 0.2); filter: blur(80px); z-index: -1;"></div>
    
    <div class="glass-container rounded-5 p-5 shadow-lg w-100" style="max-width: 500px;" data-aos="zoom-in">
        <div class="text-center mb-4">
            <h2 class="fw-bolder text-dark mb-2">Welcome Back</h2>
            <p class="text-secondary">Please enter your details to log in.</p>
        </div>
        
        <form>
            <div class="mb-4">
                <label class="form-label fw-semibold text-secondary small ms-2">Email Address</label>
                <input type="email" class="glass-input px-4 py-3" placeholder="you@example.com">
            </div>
            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label fw-semibold text-secondary small ms-2 mb-0">Password</label>
                    <a href="#" class="small text-success text-decoration-none fw-semibold">Forgot Password?</a>
                </div>
                <input type="password" class="glass-input px-4 py-3" placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-glass-primary w-100 py-3 mb-4 fs-5">Log In</button>
            
            <div class="text-center mb-4 position-relative">
                <hr class="text-secondary" style="opacity: 0.2;">
                <span class="position-absolute top-50 start-50 translate-middle px-3 text-secondary small fw-semibold" style="background: rgba(245,245,245,0.8); backdrop-filter: blur(5px);">Or login with</span>
            </div>
            
            <div class="d-flex gap-3">
                <button type="button" class="btn-glass-secondary w-100 py-2 border-0 shadow-sm d-flex align-items-center justify-content-center gap-2" style="background: rgba(255,255,255,0.8);">
                    <i class="bi bi-google text-danger"></i> Google
                </button>
                <button type="button" class="btn-glass-secondary w-100 py-2 border-0 shadow-sm d-flex align-items-center justify-content-center gap-2" style="background: rgba(255,255,255,0.8);">
                    <i class="bi bi-apple text-dark"></i> Apple
                </button>
            </div>
        </form>
        
        <p class="text-center mt-4 mb-0 text-secondary">
            Don't have an account? <a href="/signup/" class="text-success fw-bold text-decoration-none">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
